<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Menlo','Consolas','Monaco',monospace" font-size="13">
  <!-- Terminal window -->
  <rect width="720" height="420" rx="10" ry="10" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="720" height="36" rx="10" ry="10" fill="#2a2a3e"/>
  <rect y="18" width="720" height="18" fill="#2a2a3e"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="360" y="23" text-anchor="middle" fill="#8888aa" font-size="12">promptlock demo</text>

  <!-- Terminal content -->
  <!-- Prompt 1: init -->
  <text x="20" y="68" fill="#88aaff">$</text>
  <text x="34" y="68" fill="#e0e0f0">promptlock init ./prompts</text>
  <text x="20" y="90" fill="#50fa7b">✓</text>
  <text x="36" y="90" fill="#c8d0e0">Locked 3 prompt files in .promptlock.json</text>

  <!-- Divider comment -->
  <text x="20" y="118" fill="#555577"># CI check — prompts unchanged, all good</text>

  <!-- Prompt 2: check clean -->
  <text x="20" y="142" fill="#88aaff">$</text>
  <text x="34" y="142" fill="#e0e0f0">promptlock check ./prompts</text>
  <text x="20" y="164" fill="#50fa7b">✓</text>
  <text x="36" y="164" fill="#c8d0e0">All prompts are up to date.</text>

  <!-- Divider comment -->
  <text x="20" y="192" fill="#555577"># Someone edited system.prompt without telling the team</text>

  <!-- Prompt 3: check with changes -->
  <text x="20" y="216" fill="#88aaff">$</text>
  <text x="34" y="216" fill="#e0e0f0">promptlock check ./prompts</text>

  <!-- Error output box -->
  <rect x="16" y="230" width="688" height="106" rx="4" fill="#2d1a1a"/>
  <text x="28" y="252" fill="#ff6b6b">  Prompt lockfile mismatch — 2 files changed:</text>
  <text x="28" y="276" fill="#f1c40f">  ~</text>
  <text x="44" y="276" fill="#f1c40f">modified </text>
  <text x="130" y="276" fill="#c8d0e0">prompts/system.prompt</text>
  <text x="340" y="276" fill="#777799">(4 → 7 lines)</text>
  <text x="28" y="296" fill="#e74c3c">  -</text>
  <text x="44" y="296" fill="#e74c3c">deleted  </text>
  <text x="130" y="296" fill="#c8d0e0">prompts/old-fallback.prompt</text>
  <text x="370" y="296" fill="#777799">(12 lines removed)</text>
  <text x="28" y="320" fill="#888899">  1 modified, 1 deleted</text>

  <!-- Prompt 4: update -->
  <text x="20" y="360" fill="#555577"># Accept changes intentionally</text>
  <text x="20" y="384" fill="#88aaff">$</text>
  <text x="34" y="384" fill="#e0e0f0">promptlock update ./prompts</text>
  <text x="20" y="406" fill="#50fa7b">✓</text>
  <text x="36" y="406" fill="#c8d0e0">Updated .promptlock.json — 2 prompt files locked</text>
</svg>
